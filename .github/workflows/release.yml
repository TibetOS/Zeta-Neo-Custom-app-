name: Release APK

# Tag a commit `vX.Y.Z` and push the tag: this builds the release APK and
# publishes it on a GitHub Release. The in-app update check (Setup → About)
# compares the installed version against the latest release tag.
#
# Signing (optional but strongly recommended — unsigned APKs can't be
# installed, and per-run debug keys would break upgrades): add repository
# secrets RELEASE_KEYSTORE_BASE64 (base64 of the .keystore file),
# RELEASE_KEYSTORE_PASSWORD, RELEASE_KEY_ALIAS, RELEASE_KEY_PASSWORD.
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Decode signing keystore
        if: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.RELEASE_KEYSTORE_BASE64 }}" | base64 -d > "$RUNNER_TEMP/release.keystore"

      - name: Run unit tests and build release APK
        env:
          APP_VERSION_NAME: ${{ github.ref_name }}
          APP_VERSION_CODE: ${{ github.run_number }}
          RELEASE_KEYSTORE_FILE: ${{ secrets.RELEASE_KEYSTORE_BASE64 != '' && format('{0}/release.keystore', runner.temp) || '' }}
          RELEASE_KEYSTORE_PASSWORD: ${{ secrets.RELEASE_KEYSTORE_PASSWORD }}
          RELEASE_KEY_ALIAS: ${{ secrets.RELEASE_KEY_ALIAS }}
          RELEASE_KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
        run: ./gradlew testDebugUnitTest assembleRelease

      - name: Collect APK
        run: |
          apk=$(ls app/build/outputs/apk/release/*.apk | head -1)
          cp "$apk" "outlander-hub-${{ github.ref_name }}.apk"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            "outlander-hub-${{ github.ref_name }}.apk" \
            --generate-notes
